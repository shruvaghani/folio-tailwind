<header>
    <div class="header-sticky navbar bg-transparent fixed transition-all top-0 inset-x-0 w-full z-60 duration-300 [.header-sticky-on]:bg-body-bg [.header-sticky-on]:dark:bg-[#121519] [.header-sticky-on]:border-b border-default-200 dark:border-white/14" [class.header-sticky-on]="isSticky">

        <div class="container">
            <div class="flex items-center justify-between">
                <a routerLink="/" class="flex items-center lg:py-7.5 py-5">
                    <img src="assets/images/logo.svg" class="lg:h-10 h-7.5 block dark:hidden" />
                    <img src="assets/images/logo-light.svg" class="lg:h-10 h-7.5 hidden dark:block" />
                </a>

                <app-navbar />

                <div class="flex justify-end items-center gap-2">
                    <app-theme-dropdown />

                    <button type="button" class="hidden py-2.5 px-5 text-white bg-dark rounded text-2xs md:inline-flex gap-1.5 items-center disabled:opacity-50 disabled:pointer-events-none" aria-haspopup="dialog" aria-expanded="false" aria-controls="hs-offcanvas-example" data-hs-overlay="#hs-offcanvas-example">
                        <lucide-icon name="calendar" class="size-3.5"></lucide-icon>
                        Schedule a call
                    </button>

                    <div class="flex items-center lg:hidden">
                        <button type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="mobileMenuOffcanvas" data-hs-overlay="#mobileMenuOffcanvas" class="size-10 border border-default-200 dark:border-white/14 rounded flex justify-center items-center md:ms-2">
                            <iconify-icon icon="tabler:align-right" class=" text-default-800" width="28" height="28"></iconify-icon>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mobileMenuOffcanvas" class="lg:hidden hs-overlay hs-overlay-open:translate-y-0 -translate-y-full fixed top-0 inset-x-0 overflow-hidden transition-all duration-300 transform h-86 z-90 bg-body-bg shadow-xl" role="dialog" tabindex="-1" aria-labelledby="mobileMenuOffcanvas-label">
        <div class="h-16 flex items-center justify-between px-4 border-b border-default-200 dark:border-white/14 sticky top-0">
            <div class="text-lg font-bold">
                <a routerLink="/" class="flex items-center gap-2">
                    <img src="assets/images/logo.svg" class="h-9 block dark:hidden" />
                    <img src="assets/images/logo-light.svg" class="h-9 hidden dark:block" />
                </a>
            </div>

            <button type="button" class="bg-default-600/15 text-default-600 size-8 flex justify-center items-center rounded-full" aria-label="Close" data-hs-overlay="#mobileMenuOffcanvas">
                <span class="sr-only">Close</span>
                <iconify-icon icon="tabler:x" width="16" height="16"></iconify-icon>
            </button>
        </div>

        <app-mobile-menu />
    </div>

    <div id="hs-offcanvas-example" class="hs-overlay hs-overlay-open:translate-x-0 hidden translate-x-full fixed top-0 end-0 transition-all duration-300 transform h-full max-w-xs w-full z-80 bg-white border-e border-default-200 dark:bg-neutral-800  dark:border-white/14" role="dialog" tabindex="-1" aria-labelledby="hs-offcanvas-example-label">
        <div class="flex justify-between items-center py-4 px-7.5">
            <h3 id="hs-offcanvas-example-label" class="font-bold text-default-800 text-2.2xl">
                Schedule a call
            </h3>

            <button type="button" aria-label="Close" data-hs-overlay="#hs-offcanvas-example">
                <span class="sr-only">Close</span>
                <lucide-icon name="x" class="size-5"></lucide-icon>
            </button>
        </div>

        <div class="py-4 px-7.5 overflow-y-hidden h-dvh">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-base font-medium mb-2">
                        Your name *
                    </label>
                    <input type="text" placeholder="Full name" class="w-full rounded-md border border-default-300 px-5 py-2.5 text-xs placeholder:text-default-400 focus:border-primary! focus:ring-1 focus:ring-primary outline-none transition" />
                </div>

                <div class="col-span-2">
                    <label class="block text-base font-medium mb-2">
                        Email address *
                    </label>
                    <input type="email" placeholder="name@example.com" class="w-full rounded-md border border-default-300 px-5 py-2.5 text-xs placeholder:text-default-400 focus:border-primary! focus:ring-1 focus:ring-primary outline-none transition" id="floatingInput" />
                </div>

                <div class="col-span-1">
                    <label class="block text-base font-medium mb-2">
                        Schedule date *
                    </label>
                    <input type="date" class="w-full rounded-md border border-default-300 px-5 py-2.5 text-xs placeholder:text-default-400 focus:border-primary! focus:ring-1 focus:ring-primary outline-none transition" />
                </div>

                <div class="col-span-1">
                    <label class="block text-base font-medium mb-2">
                        Schedule date *
                    </label>
                    <input type="time" class="w-full rounded-md border border-default-300 px-5 py-2.5 text-xs placeholder:text-default-400 focus:border-primary! focus:ring-1 focus:ring-primary outline-none transition" />
                </div>

                <div class="col-span-2">
                    <label class="block text-base font-medium mb-2">
                        Phone number *
                    </label>
                    <input type="text" class="w-full rounded-md border border-default-300 px-5 py-2.5 text-xs placeholder:text-default-400 focus:border-primary! focus:ring-1 focus:ring-primary outline-none transition" placeholder="(xxx) xx xxxx" />
                </div>

                <div class="col-span-2">
                    <label class="block text-base font-medium mb-2">
                        Subject *
                    </label>
                    <input type="text" class="w-full rounded-md border border-default-300 px-5 py-2.5 text-xs placeholder:text-default-400 focus:border-primary! focus:ring-1 focus:ring-primary outline-none transition" placeholder="Subject name" />
                </div>

                <div class="col-span-2">
                    <label class="block text-base font-medium mb-2">
                        Message *
                    </label>
                    <textarea type="text" class="w-full rounded-md border border-default-300 px-5 py-2.5 text-xs placeholder:text-default-400 focus:border-primary! focus:ring-1 focus:ring-primary outline-none transition" placeholder="Write your message here...." id="floatingTextarea2" style="height: 150px"></textarea>
                </div>
            </div>
            <button class="bg-primary text-white w-full py-3.5 px-7.5 mt-4 rounded">Send a message</button>
        </div>
    </div>
</header>
