<header>
    <div class="header-sticky navbar bg-transparent absolute transition-all top-0 inset-x-0 w-full z-60 duration-300 [.header-sticky-on]:bg-body-bg [.header-sticky-on]:dark:bg-[#121519] [.header-sticky-on]:border-b border-default-200 dark:border-white/14" [class.header-sticky-on]="isSticky">
        <div class="bg-dark py-2 px-4 lg:block hidden">
            <app-topbar />
        </div>

        <div class="container">
            <div class="flex items-center justify-between">
                <a routerLink="/" class="flex items-center lg:py-7.5 py-5">
                    <img src="assets/images/logo.svg" class="lg:h-10 h-7.5 block dark:hidden" />
                    <img src="assets/images/logo-light.svg" class="lg:h-10 h-7.5 hidden dark:block" />
                </a>

                <app-navbar />

                <div class="flex gap-2 items-center">
                    <div class="hs-dropdown [--trigger:hover] [--auto-close:inside] [--placement:bottom-right] relative inline-flex text-default-700">
                        <button id="navSearch" type="button" class="hs-dropdown-toggle size-10 bg-secondary flex justify-center items-center rounded-full focus:outline-hidden disabled:opacity-50 hover:bg-primary/10    disabled:pointer-events-none" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
                            <lucide-icon name="search" class="size-4"></lucide-icon>
                        </button>

                        <div class="hs-dropdown-menu transition-[opacity,margin] duration hs-dropdown-open:opacity-100 opacity-0 hidden bg-dropdown shadow-custom rounded mt-2 after:h-4 after:absolute after:-bottom-4 after:start-0 after:w-full before:h-4 before:absolute bg-body-bg shadow before:-top-4 before:start-0 before:w-full" role="menu" aria-orientation="vertical" aria-labelledby="navSearch">
                            <div class="p-2">
                                <form class="flex w-full max-w-lg items-stretch overflow-hidden rounded border border-primary">
                                    <input type="search" placeholder="Search..." aria-label="Search" class="flex-1 bg-transparent px-4 py-2 text-sm
                                    outline-none border-0" />

                                    <button type="submit" class="bg-primary hover:bg-primary-hover px-4 py-2 text-sm font-medium text-white transition">
                                        Search
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <app-schedule />

                    <div class="border-s-2 border-primary/10 h-10 ms-4 hidden md:block"> </div>
                    <div class="ms-4 hidden lg:block">
                        <a [routerLink]="[]" class="block">
                            <span class="flex flex-col w-7.5 cursor-pointer group">
                                <span class="bg-default-900 rounded-[10px] h-0.5 my-0.75 w-full group-hover:w-5 transition-all duration-500 ease-[cubic-bezier(0.68,-0.6,0.32,1.6)]"> </span>
                                <span class="bg-default-900 rounded-[10px] h-0.5 my-0.75 w-5 group-hover:w-full transition-all duration-500 ease-[cubic-bezier(0.68,-0.6,0.32,1.6)]"> </span>
                                <span class="bg-default-900 rounded-[10px] h-0.5 my-0.75 w-full group-hover:w-5 transition-all duration-500 ease-[cubic-bezier(0.68,-0.6,0.32,1.6)]"></span>
                            </span>
                        </a>
                    </div>

                    <div class="flex items-center lg:hidden">
                        <button type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="mobileMenuOffcanvas" data-hs-overlay="#mobileMenuOffcanvas" class="size-10 border border-default-200 dark:border-white/14 rounded flex justify-center items-center md:ms-2">
                            <iconify-icon icon="tabler:align-right" class="text-default-800" height="28" width="28"></iconify-icon>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mobileMenuOffcanvas" class="lg:hidden hs-overlay hs-overlay-open:translate-y-0 -translate-y-full fixed top-0 inset-x-0 overflow-hidden transition-all duration-300 transform h-60 z-80 bg-body-bg shadow-xl" role="dialog" tabindex="-1" aria-labelledby="mobileMenuOffcanvas-label">
        <div class="h-16 flex items-center justify-between px-4 border-b border-default-200 dark:border-white/14 sticky top-0">
            <div class="text-lg font-bold">
                <a routerLink="/" class="flex items-center gap-2">
                    <img src="assets/images/logo.svg" class="h-9 block dark:hidden" />
                    <img src="assets/images/logo-light.svg" class="h-9 hidden dark:block" />
                </a>
            </div>

            <button type="button" class="bg-default-600/15 text-default-600 size-8 flex justify-center items-center rounded-full" aria-label="Close" data-hs-overlay="#mobileMenuOffcanvas">
                <span class="sr-only">Close</span>
                <iconify-icon icon="tabler:x" width="16" height="16"></iconify-icon>
            </button>
        </div>

        <app-mobile-menu />
    </div>

</header>
