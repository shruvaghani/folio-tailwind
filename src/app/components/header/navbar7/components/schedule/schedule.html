<button type="button" class="flex relative items-center justify-center rounded-full size-10 bg-secondary hover:bg-primary/10 disabled:opacity-50 disabled:pointer-events-none text-default-700" aria-haspopup="dialog" aria-expanded="false" aria-controls="scheduleCall" data-hs-overlay="#scheduleCall">
    <lucide-icon name="calendar" class="size-3.5"></lucide-icon>
    <span class="absolute -top-1 -end-1 inline-flex items-center py-0.5 px-1.5 rounded-full text-md font-medium transform bg-success text-white">2</span>
</button>

<div id="scheduleCall" class="hs-overlay hs-overlay-open:translate-x-0 hidden translate-x-full fixed top-0 end-0 transition-all duration-300 transform h-full max-w-90 w-full z-80 bg-body-bg border-e shadow-xl border-default-200 dark:bg-neutral-800 dark:border-neutral-700" role="dialog" tabindex="-1" aria-labelledby="scheduleCall-label">
    <div class="flex justify-between items-center py-4 px-7.5 border-b border-default-300 dark:border-white/14">
        <h3 id="scheduleCall-label" class="font-bold text-default-800 text-2.2xl">
            My Cart
        </h3>

        <button type="button" aria-label="Close" data-hs-overlay="#scheduleCall">
            <span class="sr-only">Close</span>
            <lucide-icon name="x" class="size-5"></lucide-icon>
        </button>
    </div>

    <div class="p-4 overflow-y-hidden h-full">
        <div class="flex items-center gap-2">
            <!-- Image -->
            <img src="assets/images/product/watches/01.png" class="rounded-xl bg-light p-2 h-17.5" alt="product image">

            <div class="ms-2">
                <p class="text-default-900 font-semibold mb-1">Apex Pro</p>
                <!-- Select item -->
                <select class="text-sm py-1 ps-2 pe-9 border border-default-300 dark:border-white/14 rounded" aria-label="Default select example">
                    <option value="1">01</option>
                    <option value="2">02</option>
                    <option value="3">03</option>
                </select>
            </div>
            <a [routerLink]="[]" class="text-2xs text-primary ms-auto">Remove</a>
        </div>

        <div class="w-full fixed bottom-0 end-0 p-4">
            <div class="flex justify-between mb-2">
                <span class="text-default-800 font-semibold">Subtotal</span>
                <h6 class="text-success md:text-2.2xl text-xl mb-0">$358</h6>
            </div>

            <!-- Button -->
            <div>
                <a href="checkout.html" class="bg-dark text-white text-lg py-4.75 px-8.75 w-full inline-flex rounded-lg font-semibold justify-center">Continue to Checkout</a>
            </div>
        </div>
    </div>
</div>
