<section
  class="bg-[linear-gradient(90deg,rgba(240,150,255,0.15)_0%,rgba(191,200,252,0.15)_51%,rgba(187,148,255,0.15)_100%)] lg:pb-36 pb-20"
>
  <div class="container">
    <div class="grid md:grid-cols-12 grid-cols-1 gap-7.5">
      <div class="md:col-span-7 col-span-1">
        <h3 class="mb-7.5 md:mb-12 pe-24 lg:text-4xl md:text-3.5xl text-2.5xl">
          Join over <span class="text-purple">1,000+</span> companies using Folio
        </h3>
        <div class="flex flex-wrap gap-7.5 md:gap-12">
          @for (logo of clientLogoData; track logo.gray; let i = $index) {
            <div class="relative">
              <img [src]="logo.gray" class="h-7.5" alt="client-img" />

              
              <div class="absolute top-0 start-0 opacity-0 hover:opacity-100 transition-all duration-300 ease-in-out">
              
                <img [src]="logo.light" class="hidden dark:block h-7.5" alt="client logo" />

                <img
                  [src]="logo.dark"
                  class="block dark:hidden h-7.5 opacity-0 hover:opacity-100"
                  alt="client logo"
                />
              </div>
            </div>
          }
        </div>
      </div>

      <div class="md:col-span-5 col-span-1 lg:w-100 ms-auto">
        <div class="flex gap-7.5 lg:gap-2 flex-wrap mb-7.5">
          <!-- Apple rating -->
          <div>
            <!-- Icon -->
            <img src="assets/images/elements/apple.svg" class="size-14 mb-4" alt="" />
            <!-- Rating -->
            <ul class="flex gap-1 mb-1">
              <li>
                <lucide-icon name="star" class="fill-warning size-4 text-warning"></lucide-icon>
              </li>
              <li>
                <lucide-icon name="star" class="fill-warning size-4 text-warning"></lucide-icon>
              </li>
              <li>
                <lucide-icon name="star" class="fill-warning size-4 text-warning"></lucide-icon>
              </li>
              <li>
                <lucide-icon name="star" class="fill-warning size-4 text-warning"></lucide-icon>
              </li>
              <li>
                <lucide-icon
                  name="star-half"
                  class="fill-warning size-4 text-warning"
                ></lucide-icon>
              </li>
            </ul>
            <span>4.8 stars on App Store</span>
          </div>

          <!-- Apple rating -->
          <div class="xl:ms-auto">
            <!-- Icon -->
            <img src="assets/images/elements/gicon.svg" class="size-14 mb-4" alt="" />
            <!-- Rating -->
            <ul class="flex gap-1 mb-1">
              <li>
                <lucide-icon name="star" class="fill-warning size-4 text-warning"></lucide-icon>
              </li>
              <li>
                <lucide-icon name="star" class="fill-warning size-4 text-warning"></lucide-icon>
              </li>
              <li>
                <lucide-icon name="star" class="fill-warning size-4 text-warning"></lucide-icon>
              </li>
              <li>
                <lucide-icon name="star" class="fill-warning size-4 text-warning"></lucide-icon>
              </li>
              <li>
                <lucide-icon
                  name="star-half"
                  class="fill-warning size-4 text-warning"
                ></lucide-icon>
              </li>
            </ul>
            <span>4.6 stars on Google</span>
          </div>
        </div>
        <a
          class="border border-primary my-2 text-primary font-medium hover:bg-primary hover:text-white inline-flex items-center gap-1.5 py-3.5 px-7.5 rounded-md group transition-all duration-300"
          routerLink="/contact/v1"
          >Join our community<lucide-icon
            name="arrow-right"
            class="size-4 group-hover:translate-x-0.5 text-primary group-hover:text-white transition-all duration-300"
          ></lucide-icon>
        </a>
      </div>
    </div>
  </div>
</section>
