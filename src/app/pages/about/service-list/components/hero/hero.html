<section class="lg:pt-32 lg:pb-36 pt-20 bg-linear-to-r from-[rgba(240,150,255,0.15)] via-[rgba(191,200,252,0.15)] to-[rgba(187,148,255,0.15)] relative overflow-hidden">
    <!-- Curve decoration -->
    <span>
        <svg class="absolute bottom-0 start-0 -mb-4 z-20" viewBox="0 0 1950 178" style="enable-background:new 0 0 1950 178;">
            <path class="fill-body-bg" d="M1480.3,21.8c238.7-17.4,359.6,39,469.7,74.4V178H0v-54.2V4.4c57.3,38.5,287.7,14.6,446.4,0 c170.6-15.7,342.3,14.5,440.8,33C1104,78,1274.8,36.9,1480.3,21.8z"></path>
        </svg>
    </span>

    <!-- Patten decoration -->
    <div class="absolute end-0 top-0 rotate-180 -mt-12 -me-44">
        <img src="assets/images/elements/geo-grad-pattern.svg" class="h-175 opacity-10" alt="bg pattern">
    </div>

    <!-- Patten decoration -->
    <div class="absolute start-0 bottom-0 mb-32 -ms-24">
        <img src="assets/images/elements/geo-grad-pattern.svg" class="h-100 opacity-10" alt="bg pattern">
    </div>

    <!-- Grad blur -->
    <div class="absolute top-0 start-1/2 -mt-44 -ms-44">
        <img src="assets/images/elements/grad-shape/blur-decoration.svg" class="blur-[80px] opacity-10" alt="Grad shape">
    </div>

    <div class="container">
        <div class="pt-12 pb-32">
            <div>
                <!-- Breadcrumb -->
                <nav class="mb-4 pb-2 flex justify-center" aria-label="breadcrumb">
                    <ol class="flex items-center space-x-2 text-2xs text-default-600">
                        <li>
                            <a routerLink="/" class="hover:text-primary font-medium">
                                Home
                            </a>
                        </li>

                        <li class="flex items-center">
                            <span class="px-2 text-default-400">/</span>
                            <span class="font-medium text-primary" aria-current="page">
                                Services
                            </span>
                        </li>
                    </ol>
                </nav>
                <!-- Title -->
                <h1 class="lg:text-6xl md:text-4xl text-3xl text-center">Our Services</h1>
            </div>

            @for (service of servicesData; track $index) {

            <div [class]="service.align === 'left' ? 'lg:w-240 mx-auto' : 'lg:w-240 ms-auto'">

                <div class="bg-body-bg md:p-7.5 p-4 rounded-2xl group hover:shadow-[0_10px_20px_rgba(127,57,248,0.15)] hover:-translate-y-0.75 transition-all duration-300 grid grid-cols-1 md:grid-cols-12 mt-12">

                    <!-- Image -->
                    <div class="md:col-span-5">
                        <img [src]="service.image" class="rounded-xl mb-4 md:mb-0" alt="service image">
                    </div>

                    <!-- Content -->
                    <div class="md:col-span-7">
                        <div class="flex flex-col h-full px-2 md:px-7.5 py-0 md:py-2">

                            <h5 class="mb-2 lg:text-2.5xl text-2xl">
                                {{ service.title }}
                            </h5>

                            <p class="mb-4">
                                {{ service.description }}
                            </p>

                            <!-- Features -->
                            <ul class="flex flex-wrap gap-3.5 mb-4">

                                @for (feature of service.features; track $index) {
                                <li class="flex items-center text-default-700 font-medium">
                                    <lucide-icon name="circle-check-big" class="size-4 text-success me-1.5"></lucide-icon>
                                    {{ feature }}
                                </li>
                                }

                            </ul>

                            <a class="text-primary mt-auto inline-flex gap-1 items-center" routerLink="/service/single">
                                View detail
                                <lucide-icon name="arrow-right" class="size-4 group-hover:translate-x-1 transition-all duration-300"></lucide-icon>
                            </a>

                        </div>
                    </div>

                </div>

            </div>

            }
        </div>
    </div>
</section>
