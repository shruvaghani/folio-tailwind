<section>
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 gap-7.5 items-center xl:items-end">
            <div class="md:col-span-5">
                <h2 class="mb-7.5 lg:text-4.5xl md:text-4xl text-3xl">Integrate with a wide range of <span class="text-primary">projects</span></h2>
                <p class="mb-4">Our integration solutions facilitate smooth collaboration and help you achieve project goals efficiently.</p>

                <ul class="mb-7.5 space-y-2">
                    <ul class="mb-7.5 space-y-2">
                        @for (item of featureList; track $index) {
                        <li class="flex items-start text-default-800">
                            <lucide-icon name="badge-check" class="mt-0.5 text-success size-4 me-2">
                            </lucide-icon>
                            <span>{{ item }}</span>
                        </li>
                        }
                    </ul>
                </ul>
                <a class="bg-dark text-white py-3.5 px-7.5 font-medium rounded-md gap-1.5 inline-flex items-center group" routerLink="/portfolio/modern">Explore our work<lucide-icon name="arrow-right" class="size-4 group-hover:translate-x-1 transition-all duration-300"></lucide-icon> </a>
            </div>

            <div class="md:col-span-7 lg:w-155 ms-auto">
                <div class="bg-secondary/50 rounded-2xl">
                    <img src="assets/images/elements/service-2.png" class="" alt="image">
                </div>
            </div>
        </div>
    </div>
</section>
