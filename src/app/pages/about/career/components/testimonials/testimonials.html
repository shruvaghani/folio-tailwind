<section
  class="lg:py-36 py-20 bg-linear-to-r from-[rgba(240,150,255,0.15)] via-[rgba(191,200,252,0.15)] to-[rgba(187,148,255,0.15)]"
>
  <h2 class="text-center mb-7.5 sm:mb-18 pt-32 lg:text-4.5xl md:text-4xl text-3xl">
    What people say about us
  </h2>

  <!-- Testimonials START -->
  <div class="swiper px-4 h-70">
    <swiper-container
      speed="14000"
      space-between="30"
      autoplay="true"
      autoplay-delay="0"
      autoplay-disable-on-interaction="false"
      autoplay-pause-on-mouse-enter="true"
      breakpoints='{
            "576": { "slidesPerView": 1 },
            "768": { "slidesPerView": 2 },
            "992": { "slidesPerView": 3 },
            "1400": { "slidesPerView": 4 }
        }'
      class="swiper-wrapper"
    >
      @for (item of testimonialData; track $index) {
        <swiper-slide>
          <div class="bg-body-bg rounded-xl p-7.5">
            <!-- Card body -->
            <div class="mb-7.5">
              <!-- Rating -->
              <ul class="flex gap-1 mb-4">
                @for (star of [1, 2, 3, 4, 5]; track $index) {
                  <li>
                    <lucide-icon
                      [name]="
                        item.rating >= star
                          ? 'star'
                          : item.rating >= star - 0.5
                            ? 'star-half'
                            : 'star'
                      "
                      class="size-4 fill-warning text-warning"
                    >
                    </lucide-icon>
                  </li>
                }
              </ul>

              <!-- Text -->
              <blockquote>
                <p class="text-default-900 font-medium">{{ item.text }}</p>
              </blockquote>
            </div>

            <!-- Footer -->
            <div>
              <div class="flex items-center">
                <div class="size-12 shrink-0">
                  <img class="rounded-full" [src]="item.image" alt="avatar" />
                </div>
                <div class="ms-4">
                  <p class="text-xl text-default-900">{{ item.name }}</p>
                  <small class="text-sm">{{ item.role }}</small>
                </div>
              </div>
            </div>
          </div>
        </swiper-slide>
      }
    </swiper-container>
  </div>
</section>
