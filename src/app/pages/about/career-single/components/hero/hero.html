<section class="lg:pt-32 lg:pb-24 py-20 relative overflow-hidden bg-dark">
    <div class="absolute top-0 start-0 -mt-44 -ms-12">
        <img src="assets/images/elements/grad-shape/blur-decoration.svg" class="blur-[32px] opacity-20" alt="Grad shape">
    </div>

    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 gap-7.5 pt-12 items-center">
            <div class="md:col-span-5">
                <a [routerLink]="[]" class="text-white/80 group hover:text-primary flex items-center"><lucide-icon name="arrow-left" class="size-4 me-1 group-hover:-translate-x-1 transition-all duration-300"></lucide-icon>Back to listing</a>
                <h1 class="text-white mt-4 lg:text-4.5xl md:text-4xl text-3xl">Machine Learning Specialist</h1>
            </div>

            <div class="md:col-span-7 md:ms-auto md:text-end text-start">
                <!-- Button -->
                <button type="button" class="text-white inline-flex items-center gap-1 hover:bg-success-hover py-3.5 px-7.5 rounded-md font-medium bg-success icon-link icon-link-hover group" [routerLink]="[]" aria-haspopup="dialog" aria-expanded="false" aria-controls="applyForm" data-hs-overlay="#applyForm">Apply now<lucide-icon name="arrow-right" class="size-4 group-hover:translate-x-1 transition-transform duration-300"></lucide-icon> </button>
            </div>
        </div>
    </div>
</section>

<div id="applyForm" class="hs-overlay hs-overlay-open:opacity-100 hs-overlay-open:duration-500 hidden size-full fixed top-0 start-0 z-80 opacity-0 overflow-x-hidden transition-all overflow-y-auto pointer-events-none bg-black/40" role="dialog" tabindex="-1" aria-labelledby="applyForm-label">
    <div class="lg:max-w-3xl md:max-w-2xl md:w-full m-3 md:mx-auto">
        <div class="flex flex-col bg-body-bg border border-default-200 dark:border-white/14 shadow-2xs rounded-xl pointer-events-auto">
            <div class="flex justify-between items-center p-4 border-b border-default-200 dark:border-white/14">
                <h3 id="applyForm-label" class="font-semibold text-default-900 md:text-2.2xl text-xl">
                    Apply form
                </h3>

                <button type="button" aria-label="Close" data-hs-overlay="#applyForm">
                    <span class="sr-only">Close</span>
                    <lucide-icon name="x" class="size-5"></lucide-icon>
                </button>
            </div>

            <div class="p-7.5 overflow-y-auto h-200">
                <h6 class="mb-4 md:text-2.2xl text-xl">1. Personal info</h6>

                <div class="grid md:grid-cols-2 grid-cols-1 gap-7.5 mb-12">
                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            First name
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Last name
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Email address
                        </label>
                        <input placeholder="name@example.com" type="email" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Phone
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div class="md:col-span-2">
                        <label class="block mb-2 font-medium text-default-700">
                            Linkedin url
                        </label>
                        <input placeholder="www.linkedin.com/example" type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>
                </div>

                <h6 class="mb-4 md:text-2.2xl text-xl">2. career info</h6>

                <div class="grid md:grid-cols-2 grid-cols-1 gap-7.5 mb-12">
                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Current job place
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Current job position
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Experiences
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Current salary
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Applied positions
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Expected salary
                        </label>
                        <input type="text" class="w-full rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none" />
                    </div>
                </div>

                <h6 class="mb-4 md:text-2.2xl text-xl">3. Key document</h6>

                <div class="grid grid-cols-1 gap-7.5 mb-12">
                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Upload your cv
                        </label><input type="file" id="formFile" class="block w-full text-sm text-default-700 file:me-4 file:py-3.5 file:px-7.5 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-secondary file:text-primary hover:file:bg-primary/20 border border-default-300 dark:border-white/14 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" />
                    </div>

                    <div>
                        <label class="block mb-2 font-medium text-default-700">
                            Cover letter
                        </label>
                        <textarea type="text" class="w-full h-25 rounded-md border border-default-200 dark:border-white/14 px-7.5 py-3.5 text-sm focus:border-primary! focus:ring-2 focus:ring-primary/20 outline-none"></textarea>
                    </div>

                    <div class="flex items-center gap-2 md:justify-start justify-center">
                        <input type="checkbox" id="rememberCheck" class="h-4 w-4 border-default-300 rounded! bg-white checked:bg-primary! checked:border-primary accent-primary" />
                        <label for="rememberCheck" class="text-sm text-default-700"> I have read & accepted Terms & Conditions.</label>
                    </div>
                </div>

                <div class="flex justify-between items-center mt-7.5">
                    <button type="button" class="py-3.5 px-7.5 bg-primary text-white hover:bg-primary-hover rounded-md font-medium disabled:opacity-50 disabled:pointer-events-none" data-hs-overlay="#applyForm">
                        Submit now
                    </button>

                    <button type="button" class="py-3.5 px-7.5 bg-secondary text-default-800 hover:bg-primary/20 rounded-md font-medium disabled:opacity-50 disabled:pointer-events-none">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
