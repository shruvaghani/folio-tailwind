<section class="lg:pt-32 pt-20 relative overflow-hidden bg-secondary">
    <div class="container">
        <div class="pt-12 grid lg:grid-cols-12 gap-7.5 items-center">
            <div class="md:col-span-5">
                <nav class="mb-4 pb-2 flex" aria-label="breadcrumb">
                    <ol class="flex items-center space-x-1 text-2xs text-default-600">
                        <li>
                            <a routerLink="/" class="hover:text-primary font-medium">
                                Home
                            </a>
                        </li>

                        <li>
                            <span class="px-2 text-default-400">/</span>
                            <a [routerLink]="[]" class="hover:text-primary font-medium">
                                Portfolio
                            </a>
                        </li>

                        <li class="flex items-center">
                            <span class="px-2 text-default-400">/</span>
                            <span class="font-medium text-primary" aria-current="page">
                                Portfolio case studies
                            </span>
                        </li>
                    </ol>
                </nav>
                <h1 class="mb-2 lg:text-6xl md:text-4.5xl text-4xl">Brand Identity Development</h1>
            </div>

            <div class="md:col-span-7 lg:w-100 lg:ms-auto">
                <div class="grid lg:grid-cols-2 md:grid-cols-4 grid-cols-1 gap-7.5">
                    @for (item of projectInfoData; track $index) {

                    <div>
                        <small class="text-sm">
                            {{ item.label }}
                        </small>

                        <p class="text-default-900 font-semibold mt-1">
                            {{ item.value }}
                        </p>
                    </div>

                    }

                </div>

                <a [routerLink]="[]" class="mt-7.5 inline-flex items-center text-2xs rounded-md font-medium bg-white border border-white text-dark shadow-[0_0.18rem_0.25rem_rgba(127,57,248,0.2)] py-3.5 px-7.5 hover:bg-white hover:border-white hover:text-dark hover:shadow-[0_0.3rem_0.25rem_rgba(127,57,248,0.3)] hover:-translate-y-0.75 transition-all duration-300">View project website
                    <lucide-icon name="square-pen" class="size-3.5 stroke-1 ms-1"></lucide-icon>
                </a>
            </div>
        </div>
    </div>
    <div class="mt-18 h-100 md:h-150 bg-[url('assets/images/portfolio/03.jpg')] bg-cover bg-center bg-no-repeat"></div>
</section>
