<section class="lg:pb-36 pb-20">
  <div class="container">
    <div class="md:flex md:justify-center md:mb-18 mb-7.5 items-center">
      <p class="mb-7.5 md:mb-0 me-7.5 font-medium">Filter by:</p>

      <div class="flex flex-wrap md:gap-7.5 gap-4 md:justify-center justify-start">
        @for (filter of filterData; track $index) {
          <a
            [routerLink]="[]"
            class="py-2 font-semibold"
            [ngClass]="
                $index === 0
                ? 'text-default-900 border-b-2 border-default-900'
                : 'text-default-500 hover:text-default-900 hover:border-b-2 hover:border-default-900 focus:border-b-2 focus:border-default-900 focus:text-default-900'
            "
          >
            {{ filter }}
          </a>
        }
      </div>
    </div>

    <div class="grid lg:grid-cols-3 md:grid-cols-2 grid-cols-1 lg:gap-12 gap-7.5">
      @for (item of integrationData; track $index) {
        <a
          [routerLink]="item.link"
          class="p-7.5 rounded-2xl group bg-secondary/50 hover:-translate-y-0.75 transition-all duration-300"
        >
          <div class="flex gap-4 items-center mb-4">
            <div
              class="size-14 flex justify-center items-center shadow-[0_0.2rem_0.25rem_rgba(127,57,248,0.2)] text-center bg-body-bg rounded-lg shrink-0"
              style="line-height: 3.2rem"
            >
              <img [src]="item.image" class="h-7.5" alt="" />
            </div>

            <div>
              <h6 class="md:text-2.2xl text-xl">{{ item.title }}</h6>
              <span class="text-default-700">{{ item.category }}</span>
            </div>
          </div>

          <p class="pb-4 text-default-700">
            {{ item.description }}
          </p>

          <div class="mt-7.5">
            <button class="group flex items-center gap-1.5">
              <span class="text-primary-grad font-medium">Explore integration</span>
              <lucide-icon
                name="arrow-right"
                class="group-hover:translate-x-0.5 size-4 text-primary transition-all duration-300"
              >
              </lucide-icon>
            </button>
          </div>
        </a>
      }
    </div>
  </div>
</section>
