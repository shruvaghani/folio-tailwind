<section class="bg-secondary relative min-h-screen flex justify-center items-center">
        <div class="container">
            <div class="lg:w-135.25 md:w-120.25 mx-auto relative md:p-3.75">
                <!-- Ufo -->
                <div class="animate-bounce [animation-duration:3s] absolute top-0 start-0 -ms-12 -mt-12 z-20 hidden md:block">
                    <img src="assets/images/elements/ufo.png" class="h-25 rotate-343" alt="ufo image">
                </div>

                <!-- Grad shape -->
                <div class="absolute bottom-0 end-0 -mb-32 -me-12 hidden md:block">
                    <img src="assets/images/elements/grad-shape/blur-decoration.svg" class="blur-[80px] opacity-20" alt="Grad shape">
                </div>

                <div class="md:p-12 p-7.5 border border-white/10 relative rounded-2xl bg-white/20 backdrop-blur-[5px] shadow-[0_0.2rem_0.25rem_rgba(127,57,248,0.2)] text-center">
                    <h1 class="mb-2 lg:text-4xl md:text-3.5xl text-2.5xl font-bold">Sign in</h1>
                    <p class="text-default-700">Don't have an account?<a routerLink="/auth/sign-up" class="text-primary-grad"> Click here to sign up</a></p>

                    <form class="mt-2 md:mt-7.5">
                        <!-- Email -->
                        <div class="mb-4">
                            <input type="email" placeholder="Enter email" class="w-full py-3.5 px-7.5 border border-default-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-default-400" />
                        </div>

                        <!-- Password -->
                        <div class="mb-4 relative">
                            <div class="relative">
                                <input id="password" type="password" class="w-full py-3.5 px-7.5 pe-14 border border-default-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary placeholder:text-default-400" placeholder="Enter password" value="">
                                <button type="button" data-hs-toggle-password='{"target": "#password"}' class="absolute top-1/2 end-3 -translate-y-1/2 cursor-pointer">
                                    <lucide-icon name="eye" class="hs-password-active:block hidden size-4"></lucide-icon>
                                    <lucide-icon name="eye-off" class="hs-password-active:hidden size-4"></lucide-icon>
                                </button>
                            </div>
                        </div>

                        <!-- Remember me / Forgot password -->
                        <div class="mb-4 md:flex md:justify-between items-start md:items-center gap-2">
                            <div class="flex items-center gap-2 md:justify-start justify-center">
                                <input type="checkbox" id="rememberCheck" class="h-4 w-4 border-default-300 rounded! bg-white checked:bg-primary! checked:border-primary accent-primary" />
                                <label for="rememberCheck" class="text-base text-default-700">Remember me?</label>
                            </div>
                            <a routerLink="/auth/forgot-password" class="text-base text-primary hover:underline">Forgot password?</a>
                        </div>

                        <!-- Button -->
                        <div class="w-full mb-1.5">
                            <button type="submit" class="px-7.5 py-3.5 bg-primary text-white rounded-md hover:bg-primary-hover transition-colors w-full">
                                Login
                            </button>
                        </div>

                        <!-- Divider -->
                        <div class="flex items-center my-5">
                            <hr class="grow border-t border-default-300 my-4">
                            <p class="px-7.5 text-sm text-default-500 mb-0">Or</p>
                            <hr class="grow border-t border-default-300 my-4">
                        </div>

                        <!-- Social buttons -->
                        <div class="flex justify-center gap-4">
                            <a [routerLink]="[]" class="flex items-center justify-center size-10 bg-[#5d82d1] text-white rounded-md transition">
                                <iconify-icon icon="tabler:brand-facebook" class="size-4"></iconify-icon>
                            </a>

                            <a [routerLink]="[]" class="flex items-center justify-center size-10 bg-body-bg border border-default-200 dark:border-white/14 text-default-500 rounded-md transition">
                                <iconify-icon icon="tabler:brand-google" class="size-4"></iconify-icon>
                            </a>
                        </div>

                        <!-- Copyright -->
                        <div class="mt-4 text-sm text-default-700">
                            Copyrights ©2024 Folio. Build by
                            <a href="https://stackbros.in/" target="_blank" class="hover:text-primary hover-underline">
                                StackBros
                            </a>.
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
