<section class="xl:-mt-32 lg:-mt-24 -mt-18 relative z-10 lg:pb-36 pb-20">
  <div class="container">
    <div class="grid md:grid-cols-3 grid-cols-1 lg:gap-12 gap-7.5 lg:mt-12 mt-7.5">
      @for (item of contactCardsData; track $index) {
        <div class="bg-secondary p-7.5 rounded-2xl">
          <div
            class="size-14 text-white rounded-full flex justify-center items-center mb-4"
            [ngClass]="item.bgClass"
          >
            <lucide-icon [name]="item.icon" class="size-4.5"></lucide-icon>
          </div>

          <h6 class="mb-2 md:text-2.2xl text-xl">
            {{ item.title }}
          </h6>

          <p class="text-default-700">
            {{ item.description }}
          </p>

          <div class="pt-4">
            @if (!item.isButton) {
              <a [routerLink]="[]" class="text-primary-grad font-medium mt-auto">
                {{ item.linkText }}
              </a>
            }

            @if (item.isButton) {
              <a
                [routerLink]="[]"
                class="rounded-md inline-flex items-center gap-1 font-medium bg-white border border-white text-dark shadow-[0_0.18rem_0.25rem_rgba(127,57,248,0.2)] py-2.5 px-5 hover:bg-white hover:border-white hover:text-dark hover:shadow-[0_0.3rem_0.25rem_rgba(127,57,248,0.3)] hover:-translate-y-0.75 transition-all duration-300 text-2xs"
              >
                {{ item.linkText }}
                <lucide-icon name="arrow-right" class="size-3.5"></lucide-icon>
              </a>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
