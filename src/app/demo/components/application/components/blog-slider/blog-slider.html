<section class="lg:pb-36 pb-10">
  <div class="container">
    <div class="grid md:grid-cols-12 grid-cols-1 md:gap-7.5 gap-2.5 items-center">
      <div class="md:col-span-5">
        <h3 class="mb-0 text-center sm:text-start lg:text-4xl md:text-3.5xl text-2.5xl">
          Our latest insights
        </h3>
      </div>

      <div class="md:col-span-7">
        <div class="flex justify-center sm:justify-end gap-4 relative mt-4">
          <a
            [routerLink]="[]"
            class="size-12 rounded-full flex justify-center items-center bg-secondary hover:bg-primary/15"
            id="swiper-button-prev"
            ><lucide-icon name="arrow-left"></lucide-icon
          ></a>
          <a
            [routerLink]="[]"
            class="size-12 rounded-full flex justify-center items-center bg-secondary hover:bg-primary/15"
            id="swiper-button-next"
            ><lucide-icon name="arrow-right"></lucide-icon
          ></a>
        </div>
      </div>
    </div>

    <div class="swiper mt-0">
      <swiper-container
        space-between="50"
        loop="true"
        autoplay="false"
        navigation="true"
        navigation-next-el="#swiper-button-next"
        navigation-prev-el="#swiper-button-prev"
        breakpoints='{
                        "576": { "slidesPerView": 1 },
                        "768": { "slidesPerView": 2 },
                        "992": { "slidesPerView": 3 }
                 }'
        class="swiper-wrapper"
      >
        @for (item of blogSlidesData; track item.title) {
          <!-- Blog item -->
          <swiper-slide class="py-7.5 group">
            <article class="shadow-sm rounded-2xl overflow-hidden h-full">
              <!-- Card image -->
              <div class="overflow-hidden">
                <img
                  [src]="item.img"
                  class="group-hover:scale-104 transition-all duration-500"
                  alt="Blog-img"
                />
              </div>

              <!-- Card Body -->
              <div class="pt-5 px-5 pb-2">
                <!-- Title -->
                <h6 class="md:text-2.2xl text-xl mb-2">
                  <a [routerLink]="[]">
                    {{ item.title }}
                  </a>
                </h6>

                <p class="text-default-700">
                  {{ item.description }}
                </p>
              </div>

              <!-- Card footer -->
              <div class="pb-5 px-5">
                <a
                  class="group inline-flex gap-1 items-center text-primary"
                  [routerLink]="item.link"
                >
                  Read more
                  <lucide-icon
                    name="arrow-right"
                    class="size-4 group-hover:translate-x-1 transition-all duration-300"
                  >
                  </lucide-icon>
                </a>
              </div>
            </article>
          </swiper-slide>
        }
      </swiper-container>
    </div>
    <!-- Blogs END -->
  </div>
</section>
