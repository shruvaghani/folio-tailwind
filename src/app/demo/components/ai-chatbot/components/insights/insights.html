<section class="lg:pb-36 pb-20">
  <div class="container">
    <div class="grid lg:grid-cols-2 grid-cols-1 gap-7.5">
      <div class="relative lg:pe-24 lg:order-1 order-2">
        <img src="assets/images/about/14.jpg" class="rounded-2xl" alt="feature image" />
        <img
          src="assets/images/elements/chat-msg.svg"
          class="absolute top-0 start-1/2 -translate-x-1/2 -ms-44 -mt-12 rotate-13 hidden md:block"
          alt=""
        />
      </div>

      <div class="ms-auto lg:order-2 order-1 md:mb-18 lg:mb-0 mb-0">
        <h4 class="lg:text-3.5xl md:text-2.5xl text-2xl">
          "AI chatbots innovate conversations with insights from extensive knowledge repositories"
        </h4>
        <div class="mt-7.5">
          <p class="text-default-900 text-xl font-semibold">Jacqueline Miller</p>
          <span class="text-base">CEO &amp; Founder</span>
        </div>

        <hr class="my-7.5 border-t border-primary/20" />

        <div class="grid md:grid-cols-3 grid-cols-2 gap-4 md:gap-7.5">
          @for (item of statsData; track item.label) {
            <div>
              <h2 class="lg:text-4.5xl md:text-4xl text-3xl">
                {{ item.value }}
                <span [ngClass]="item.suffixClass">
                  {{ item.suffix }}
                </span>
              </h2>

              <p class="text-default-700">
                {{ item.label }}
              </p>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
