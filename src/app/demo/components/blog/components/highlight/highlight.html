<section class="bg-secondary overflow-hidden lg:pb-36 pb-20 lg:pt-44 pt-20">
    <div class="container">
        <div class="pt-32">
            <div class="grid md:grid-cols-12 grid-cols-1 mb-7.5">
                <div class="md:col-span-5">
                    <h3 class="lg:text-4xl md:text-3.5xl text-2.5xl text-center sm:text-start">Last week top highlights</h3>
                </div>

                <div class="md:col-span-7">
                    <div class="flex justify-center sm:justify-end gap-4 relative mt-4">
                        <a [routerLink]="[]" class="size-12 flex justify-center items-center rounded-full border border-primary hover:bg-primary  text-primary  hover:text-white swiper-button-prev-blog"><lucide-icon name="arrow-left" class="size-5"></lucide-icon></a>
                        <a [routerLink]="[]" class="size-12 flex justify-center items-center rounded-full border border-primary hover:bg-primary  text-primary  hover:text-white swiper-button-next-blog"><lucide-icon name="arrow-right" class="size-5"></lucide-icon></a>
                    </div>
                </div>
            </div>

            <div class="swiper">
                <swiper-container space-between="50" loop="true" autoplay="false" navigation-next-el=".swiper-button-next-blog" navigation-prev-el=".swiper-button-prev-blog" [breakpoints]="{
            '576': { slidesPerView: 1 },
            '768': { slidesPerView: 2 },
            '992': { slidesPerView: 3 },
                     }">
                    @for (item of blogHighlightData; track item.title) {
                    <div class="swiper-slide rounded-2xl">
                        <div class="rounded-2xl group hover:shadow-[0_10px_20px_rgba(127,57,248,0.15)] transition-all duration-300 relative bg-body-bg!">
                            @if (item.type === 'image') {
                            <img [src]="item.image" class="rounded-t-2xl" alt="Blog-img">
                            @if (item.category) {
                            <div class="text-dark bg-white absolute top-0 start-0 m-7.5 text-xs rounded px-1.5 py-1">{{ item.category }}</div>
                            }
                            } @else if (item.type === 'youtube') {
                            <div class="relative w-full aspect-video">
                                <iframe [src]="getSafeUrl(item.videoUrl!)" allow="autoplay; encrypted-media" allowfullscreen class="absolute inset-0 size-full rounded-t-2xl">
                                </iframe>
                            </div>
                            }

                            @else if (item.type === 'vimeo') {
                            <div class="relative w-full aspect-video">
                                <iframe [src]="getSafeUrl(item.videoUrl!)" allowfullscreen class="absolute inset-0 size-full rounded-t-2xl">
                                </iframe>
                            </div>
                            }

                            <div class="pb-2 pt-5 px-5">
                                <h6 class="md:text-2.2xl text-xl mb-2 hover:text-primary transition-all">
                                    <a [routerLink]="item.link">{{ item.title }}</a>
                                </h6>
                            </div>

                            <div class="pb-5 px-5">
                                <a [routerLink]="item.link" class="flex items-center gap-1.5">
                                    <span class="text-primary-grad">Read more</span>
                                    <lucide-icon name="arrow-right" class="group-hover:translate-x-0.5 size-4 text-primary transition-all duration-300"></lucide-icon>
                                </a>
                            </div>
                        </div>
                    </div>
                    }
                </swiper-container>
            </div>
        </div>
    </div>
</section>
