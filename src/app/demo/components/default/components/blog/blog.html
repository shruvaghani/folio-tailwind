<section class="lg:py-36 py-20">
  <div class="container">
    <h2 class="mb-12 lg:text-4.5xl md:text-4xl text-3xl text-center">Insights on our blog</h2>

    <div class="grid md:grid-cols-3 grid-cols-1 lg:gap-12 gap-7.5">
      @for (item of blogData; track item.title) {
        @if (item.type === 'image-card') {
          <a
            [routerLink]="item.link"
            class="border border-primary/25 rounded-2xl group hover:shadow-[0_10px_20px_rgba(127,57,248,0.15)] hover:-translate-y-0.75 transition-all duration-300 relative"
          >
            <img [src]="item.image" class="rounded-t-2xl" alt="Blog-img" />

            <div
              class="text-dark bg-white absolute top-0 start-0 m-7.5 text-xs rounded px-1.5 py-1"
            >
              {{ item.category }}
            </div>

            <div class="pb-2 pt-5 px-5">
              <h6 class="md:text-2.2xl text-xl mb-2">
                {{ item.title }}
              </h6>
            </div>

            <div class="pb-5 px-5">
              <button class="flex items-center gap-1.5">
                <span class="text-primary-grad">{{ item.buttonText }}</span>
                <lucide-icon
                  name="arrow-right"
                  class="group-hover:translate-x-0.5 size-4 text-primary transition-all duration-300"
                >
                </lucide-icon>
              </button>
            </div>
          </a>
        }

        @if (item.type === 'gradient-card') {
          <a
            [routerLink]="item.link"
            class="border border-primary/25 rounded-2xl group hover:shadow-[0_10px_20px_rgba(127,57,248,0.15)] hover:-translate-y-0.75 transition-all duration-300 relative p-7.5 bg-[linear-gradient(180deg,#543DE7_0%,#7F39F8_100%)] flex flex-col justify-between"
          >
            <div>
              <div class="text-white bg-dark text-xs rounded px-1.5 py-1 mb-4 inline-block">
                {{ item.category }}
              </div>

              <div>
                <h6 class="md:text-2.2xl text-xl mb-12 text-white">
                  {{ item.title }}
                </h6>
              </div>
            </div>

            <div>
              <button class="flex items-center gap-1.5">
                <span class="text-white">{{ item.buttonText }}</span>
                <lucide-icon
                  name="arrow-right"
                  class="group-hover:translate-x-0.5 size-4 text-white transition-all duration-300"
                >
                </lucide-icon>
              </button>
            </div>
          </a>
        }
      }
    </div>

    <div class="text-center mt-12">
      <p class="mb-4">Want more insights?</p>
      <a
        routerLink="/blog/minimal"
        class="rounded-md font-medium bg-white border border-white text-dark shadow-[0_0.18rem_0.25rem_rgba(127,57,248,0.2)] py-3.5 px-7.5 hover:bg-white hover:border-white hover:text-dark hover:shadow-[0_0.3rem_0.25rem_rgba(127,57,248,0.3)] hover:-translate-y-0.75 transition-all duration-300 inline-flex"
        >Explore all resources</a
      >
    </div>
  </div>
</section>
