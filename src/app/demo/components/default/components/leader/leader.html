<section class="lg:pb-36 pb-20 bg-secondary">
        <div class="container">
            <div class="grid lg:grid-cols-4 grid-cols-1 gap-7.5">
                <div class="cols-span-1">
                    <div class="flex items-center justify-center lg:justify-start">
                        <h6 class="md:text-2.2xl text-xl font-semibold">Collaborating with industry leaders</h6>
                        <div class="bg-primary border h-13.75 opacity-20 hidden lg:block"></div>
                    </div>
                </div>

                <div class="col-span-3">
                    <div class="swiper" >
                        <!-- Slider items -->
                        <swiper-container 
                        space-between="50" 
                        loop="true" autoplay="true"
                        breakpoints='{
                        "576": { "slidesPerView": 3 },
                        "768": { "slidesPerView": 4 },
                        "1200": { "slidesPerView": 5 }
                         }'
                        class="swiper-wrapper flex items-center">
                             @for (item of clientData; track $index) {
                            <swiper-slide>
                                <div class="relative">
                                    <img [src]="item.grayLogo" class="lg:p-4 p-2" alt="client-img">
                                    <div class="absolute top-0 start-0 opacity-0 hover:opacity-100 transition-all duration-300 ease-in-out">
                                        <img [src]="item.lightLogo" class="dark:block hidden lg:p-4 p-2" alt="client logo">
                                        <img [src]="item.darkLogo" class="dark:hidden lg:p-4 p-2" alt="client logo">
                                    </div>
                                </div>
                            </swiper-slide>
                        }
                        </swiper-container>
                    </div>
                </div>
            </div>
        </div>
    </section>
