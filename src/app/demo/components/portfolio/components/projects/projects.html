<section class="lg:py-36 py-20">
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 items-center gap-7.5 mb-7.5">
            <div class="md:col-span-5">
                <h2 class="mb-4 md:mb-0 lg:text-4.5xl md:text-4xl text-3xl md:text-start text-center">A glimpse of my projects</h2>
            </div>

            <div class="md:col-span-7">
                <div class="col-span-5 ms-auto text-center md:text-end">
                    <a [routerLink]="[]" class="text-white bg-primary py-3.5 px-7.5 rounded font-medium hover:bg-primary-hover">View all projects</a>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 grid-cols-1 gap-7.5 mb-18 items-center">
            @for (item of portfolioData; track $index) {
            <div class="group bg-transparent" [class]="item.widthClass">
                <div class="rounded-2xl overflow-hidden relative">
                    <!-- Card Image -->
                    <img [src]="item.image" class="rounded-2xl overflow-hidden group-hover:scale-104 transition-all duration-500" alt="portfolio-img">
                    <!-- Arrow button -->
                    <div class="z-20 absolute inset-0 flex flex-col items-center justify-center p-12 opacity-0 group-hover:opacity-100 transition-all duration-500">
                        <div class="flex justify-center items-center size-18 bg-dark text-white rounded-full"><lucide-icon name="arrow-up-right"></lucide-icon></div>
                    </div>
                </div>

                <!-- Card body -->
                <div class="flex justify-between pt-5">
                    <div>
                        <h6 class="mb-2 md:text-2.2xl text-xl"><a [routerLink]="item.link" class="">{{ item.title }}</a></h6>
                        <span>{{ item.category }}</span>
                    </div>
                    <small class="text-sm">{{ item.year }}</small>
                </div>
            </div>
            }
        </div>

        <div class="inline-flex justify-center mx-auto w-full">
            <p class="bg-dark rounded-md text-white text-center px-12 py-4 mb-0">✌️ Let's create a modern, engaging website for your business.
                <a [routerLink]="[]" class="font-semibold hover-underline text-white">Hire me</a>
            </p>
        </div>
    </div>
</section>
