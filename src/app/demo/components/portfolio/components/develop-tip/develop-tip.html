<section class="lg:py-36 py-20">
    <div class="container">
        <div class="grid lg:grid-cols-3 grid-cols-1 gap-7.5">
            <div class="col-span-1">
                <div class="sticky top-10">
                    <h2 class="mb-4 lg:text-4.5xl md:text-4xl text-3xl">Development tips &amp; trends</h2>
                    <p class="sm:mb-12 flex items-center"><lucide-icon name="instagram" class="size-4 text-primary me-2"></lucide-icon>Follow us on <b class="mx-1"> Instagram </b> to see life at <a [routerLink]="[]" class="hover-underline text-primary font-medium">@folio</a></p>
                </div>
            </div>

            <div class="lg:w-182 ms-auto lg:col-span-2">
                @for (blog of blogData; track $index) {
                <article class="group hover:-translate-y-1 bg-transparent border-b border-default-200 dark:border-white/14 rounded-0 p-7.5 ps-0 transition-all duration-500">
                    <div class="grid grid-cols-12 gap-7.5 sm:items-center">
                        <!-- Image -->
                        <div class="lg:col-span-2 md:col-span-3 col-span-5">
                            <img [src]="blog.image" class="rounded-xl" alt="blog-img">
                        </div>
                        <!-- Content -->
                        <div class="lg:col-span-10 md:col-span-9 col-span-7">
                            <div>
                                <!-- Title -->
                                <h6 class="mb-4 md:mb-0 md:text-2.2xl text-xl">{{ blog.title }}</h6>
                                <!-- list and button -->
                                <div class="sm:flex justify-between items-center mt-4">
                                    <ul class="flex items-center">
                                        <li class="hidden sm:block">{{ blog.date }}</li>
                                        <li><lucide-icon name="dot" class="lg:block hidden"></lucide-icon></li>
                                        <li class="hidden xl:block">5 min read</li>
                                    </ul>
                                    <a class="text-primary flex items-center gap-1" [routerLink]="blog.link">Read more<lucide-icon name="arrow-right" class="size-4 group-hover:translate-x-1 transition-all duration-300"></lucide-icon> </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
                }
            </div>
        </div>
    </div>
</section>
