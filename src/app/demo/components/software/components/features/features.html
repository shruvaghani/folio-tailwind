<section class="bg-secondary relative overflow-hidden lg:py-36 py-20">
    <span class="absolute top-0 start-0">
        <svg class="fill-body-bg" width="1920" height="237" viewBox="0 0 1920 237" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1940.5 0H-9V164C708.2 295.2 1589.5 218.667 1940.5 164V0Z"></path>
        </svg>
    </span>

    <div class="container">
        <div class="relative z-50">
            <div class="absolute top-0 start-1/2 -translate-x-1/2 -mt-4">
                <img src="assets/images/elements/grad-shape/blur-decoration-2.svg" class="opacity-20 blur-[80px]" alt="Grad shape">
            </div>

            <div class="border border-white/25 relative rounded-2xl bg-body-bg/20 backdrop-blur-[5px] shadow-[0_0.3rem_0.7rem_rgba(127,57,248,0.2)] p-7.5">
                <span class="text-purple">
                    <svg class="mb-5" width="40" height="10" viewBox="0 0 40 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 5C10 7.76142 7.76142 10 5 10C2.23858 10 0 7.76142 0 5C0 2.23858 2.23858 0 5 0C7.76142 0 10 2.23858 10 5Z" fill="currentColor"></path>
                        <path d="M25 5C25 7.76142 22.7614 10 20 10C17.2386 10 15 7.76142 15 5C15 2.23858 17.2386 0 20 0C22.7614 0 25 2.23858 25 5Z" fill="currentColor"></path>
                        <path d="M40 5C40 7.76142 37.7614 10 35 10C32.2386 10 30 7.76142 30 5C30 2.23858 32.2386 0 35 0C37.7614 0 40 2.23858 40 5Z" fill="currentColor"></path>
                    </svg>
                </span>

                <div class="grid md:grid-cols-12 grid-cols-1 rounded-2xl overflow-hidden">
                    <!-- Call image -->
                    <div class="md:col-span-5">
                        <div class="h-full relative">
                            <!-- Image -->
                            <img src="assets/images/bg/02.jpg" alt="" class="h-full object-cover">

                            <!-- Actions -->
                            <div class="p-5 flex flex-col absolute inset-0">
                                <ul class="flex gap-4 mb-1 mt-auto mx-auto">
                                    <li>
                                        <button class="size-12 flex justify-center items-center rounded-full bg-white text-dark/70" type="button"><lucide-icon name="mic"></lucide-icon></button>
                                    </li>

                                    <li>
                                        <button class="size-12 flex justify-center items-center rounded-full bg-white text-dark/70" type="button"><lucide-icon name="video"></lucide-icon></button>
                                    </li>

                                    <li>
                                        <button class="size-12 flex justify-center items-center rounded-full bg-danger text-white" type="button"><lucide-icon name="phone-missed"></lucide-icon></button>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="md:col-span-7">
                        <div class="h-full bg-[url('assets/images/bg/code.jpg')] bg-no-repeat bg-cover bg-top-left"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Client slider START -->

        <div class="swiper mt-18">
            <swiper-container space-between="50" slides-per-view="2" , loop="true", autoplay="true" [breakpoints]='{
    "576": { "slidesPerView": 3 },
    "768": { "slidesPerView": 4 },
    "1200": { "slidesPerView": 6 },
    "1400": { "slidesPerView": 8 }
  }'  class="swiper-wrapper align-items-center">
                @for (logo of clientLogoData; track logo.alt) {
                <swiper-slide>
                    <div class="relative">
                        <img [src]="logo.grayLogo" [alt]="logo.alt">
                        <div class="absolute top-0 start-0 opacity-0 hover:opacity-100 transition-all duration-300 ease-in-out">
                            <img [src]="logo.lightLogo" class="dark:block hidden" [alt]="logo.alt">
                            <img [src]="logo.darkLogo" class="dark:hidden" [alt]="logo.alt">
                        </div>
                    </div>
                </swiper-slide>
                }
            </swiper-container>
            <!-- Client slider END -->
        </div>
    </div>
</section>
