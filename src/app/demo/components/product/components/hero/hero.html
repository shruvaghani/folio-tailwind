<section class="lg:pt-44 pt-20 relative overflow-hidden">
    <div class="absolute top-0 end-0 mt-32 -me-12">
        <img src="assets/images/elements/grad-shape/blur-decoration.svg" class="blur-[144px] opacity-20" alt="Grad shape">
    </div>

    <div class="absolute lg:ms-44 mt-32 rotate-335 hidden lg:block">
        <img src="assets/images/elements/weather-info.png" alt="weather-info">
    </div>

    <div class="container">
        <div class="mb-32 md:mt-12 mt-6 lg:w-225 mx-auto text-center">
            <h1 class="lg:text-7xl md:text-5.5xl text-[40px] font-bold mb-7.5">Smart technology on your wrist</h1>
            <p class="lg:w-169 mx-auto mb-7.5 text-default-800">Discover the perfect blend of style and technology. Stay connected, track your health, and elevate your everyday life.</p>
            <a [routerLink]="[]" class="inline-flex font-medium bg-primary text-white items-center justify-center py-3.5 px-7.5 rounded-md hover:bg-primary-hover">Explore collections</a>
        </div>
    </div>

    <div class="bg-linear-to-r from-[rgba(240,150,255,0.15)] via-[rgba(191,200,252,0.15)] to-[rgba(187,148,255,0.15)] relative">
        <span>
            <svg class="absolute top-0 start-0 fill-body-bg" viewBox="0 0 1921 209" xml:space="preserve">
                <path class="fill-body-bg" d="M1920.5,209C1092.5-17.8,295.2,114.5,0,209V0h1920.5V209z"></path>
            </svg>
        </span>

        <div class="container relative">
            <div class="absolute top-0 end-0 -ms-18 -mt-44 hidden sm:block">
                <img src="assets/images/elements/call-notif.png" alt="decoration">
            </div>
            <img src="assets/images/product/digital-watch-hero.png" class="-mt-18 md:-mt-32" alt="digital watch image">
        </div>
    </div>
</section>
