<section class="bg-linear-to-e from-[rgba(240,150,255,0.15)] via-[rgba(191,200,252,0.15)] to-[rgba(187,148,255,0.15)] lg:py-36 py-20">
    <div class="container">
        <div class="grid md:grid-cols-3 grid-cols-1 lg:gap-12 gap-7.5">
            @for (item of featuresData; track $index) {
            <div class="flex flex-wrap gap-4">
                <div class="size-18 flex items-center justify-center rounded-md shrink-0" [class]="item.bgColor">
                    <div [class]="item.textColor" [innerHTML]="getIcon(item.icon)">
                    </div>
                </div>

                <div>
                    <h6 class="mb-2 md:text-2.2xl text-xl">{{ item.title }}</h6>
                    <p class="mb-4 text-default-800">{{ item.description }}</p>
                </div>
            </div>
            }
        </div>
    </div>
</section>
