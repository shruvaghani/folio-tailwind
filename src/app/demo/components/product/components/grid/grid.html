<section class="lg:pt-36 pt-20 lg:pb-32 pb-20">
    <div class="container">
        <div class="sm:flex justify-between text-center mb-24">
            <h2 class="mb-4 sm:mb-0 lg:text-4.5xl md:text-4xl text-3xl">Our collections</h2>
            <a [routerLink]="[]" class="group text-primary inline-flex items-center gap-1 group font-medium">View all products <lucide-icon name="arrow-right" class="size-4 group-hover:translate-x-1 transition-all duration-300"></lucide-icon></a>
        </div>

        <div class="grid lg:grid-cols-4 md:grid-cols-2 grid-cols-1 gap-7.5">
            @for (item of watchProductsData; track $index) {
            <div class="rounded-xl relative text-center bg-secondary/40 p-7.5 h-full group">
                @if (item.hasDiscount) {
                <div class="absolute top-0 start-0 -mt-4 -ms-4">
                    <img [src]="item.discountImage" class="relative" alt="">
                    <span class="text-sm text-white absolute top-1/2 start-1/2 -translate-x-1/2 -translate-y-1/2">
                        {{ item.discount }}
                    </span>
                </div>
                }
                <!-- Card header -->
                <div class="bg-transparent p-4 -mt-24 overflow-hidden">
                    <img [src]="item.image" class="group-hover:scale-104 transition-all duration-500" alt="watch image">
                </div>

                <!-- Card body -->
                <div class="mt-4">
                    <h6 class="mb-2 md:text-2.2xl text-xl"><a [routerLink]="[]">{{ item.name }}</a></h6>
                    <p class="mb-4 text-default-700"> {{ item.description }}</p>
                    @if (item.hasDiscount) {
                    <div class="flex items-center gap-2 justify-center">
                        <span class="text-success font-semibold md:text-2.2xl text-xl">
                            ${{ item.price }}
                        </span>
                        <small class="line-through">${{ item.oldPrice }}</small>
                    </div>
                    } @else {
                    <span class="text-success md:text-2.2xl text-xl font-semibold">
                        ${{ item.price }}
                    </span>
                    }
                </div>

                <!-- Card footer -->
                <div class="pt-4">
                    <a [routerLink]="[]" class="py-2.5 px-5 text-2xs rounded bg-dark text-white">Buy now</a>
                </div>
            </div>
            }
        </div>
    </div>
</section>
