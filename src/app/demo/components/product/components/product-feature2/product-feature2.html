<section class="lg:py-36 py-20 bg-dark relative overflow-x-hidden">
    <div class="w-3/4 absolute bottom-0 end-0 lg:translate-x-44 hidden md:block">
        <img src="assets/images/product/feature-bg.png" class="ps-32 relative z-20" alt="">
    </div>

    <div class="absolute bottom-1/2 end-0 translate-x-1/2">
        <img src="assets/images/elements/grad-shape/blur-decoration-2.svg" class="opacity-20 blur-[144px]" alt="Grad shape">
    </div>

    <div class="container">
        <div class="grid lg:grid-cols-2">
            <div>
                <h2 class="mb-7.5 md:mb-18 text-white lg:text-4.5xl md:text-4xl text-3xl">Advanced functionality for every moment</h2>

                <div class="grid md:grid-cols-2 grid-cols-1 gap-12">
                    @for (item of watchFeatureData; track $index) {
                    <div>
                        <lucide-icon [name]="item.icon" class="size-9.5" [class]="item.className"></lucide-icon>
                        <h6 class="my-4 md:text-2.2xl text-xl text-white">{{ item.title }}</h6>
                        <p class="text-white/80">{{ item.description }}</p>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>
</section>
