<section class="overflow-hidden md:pt-24 pt-18">
  <div
    class="lg:py-44 md:pt-18 pb-32 pt-4 relative bg-[url('assets/images/bg/04.jpg')] bg-no-repeat bg-cover bg-top"
  >
    <div class="absolute inset-0 z-10 bg-black/50"></div>
    <div class="container">
      <div class="relative py-4 z-30 lg:w-1/2 md:w-9/10">
        <h1 class="text-white font-bold lg:text-[67px] md:text-[51px] text-3xl my-7.5">
          Empowering Your <span class="font-normal">Financial</span> Future
        </h1>
        <p class="text-white text-xl font-medium mb-7.5 md:mb-12">
          Our team is dedicated to helping you achieve your financial goals with confidence and
          clarity.
        </p>

        <a
          [routerLink]="[]"
          class="group inline-flex items-center gap-1.5 py-3.5 px-7.5 rounded-md bg-primary-grad"
        >
          <span>Get started today</span>
          <lucide-icon
            name="arrow-right"
            class="group-hover:translate-x-0.5 size-4 text-white transition-all duration-300"
          ></lucide-icon>
        </a>
      </div>
    </div>
  </div>
</section>
