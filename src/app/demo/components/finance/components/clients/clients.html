<section class="lg:pb-36 pb-20 lg:pt-24 md:pt-12">
  <div class="container">
    <div class="grid lg:grid-cols-12 grid-cols-1 gap-7.5">
      <div class="col-span-5">
        <h2 class="mb-7.5 lg:text-4.5xl md:text-4xl text-3xl">Trusted by industry leaders</h2>
        <p class="mb-2">
          3000+ Users rated us <span class="text-warning font-bold">4.85</span> out of 5.
        </p>
        
        <ul class="flex items-center -space-x-3 mb-2">
          @for (item of avatarsData; track $index) {
            <li>
              <img class="size-10 rounded-full" [src]="item" alt="avatar" />
            </li>
          }
        </ul>
      </div>

      <div class="col-span-7">
        <div class="flex gap-4 flex-wrap">
          @for (item of clientLogoData; track $index) {
            <div>
              <div class="bg-secondary/50 rounded-2xl p-4">
                
                <img [src]="item.dark" class="dark:hidden h-7.5" alt="client logo" />

                <img [src]="item.light" class="hidden dark:block h-7.5" alt="client logo" />
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
