<section class="lg:pb-36 pb-20 overflow-hidden">
  <div class="container">
    <div class="grid lg:grid-cols-12 grid-cols-1 lg:gap-x-7.5 lg:gap-y-0 gap-y-7.5 items-center">
      <div class="col-span-5 relative">
        <div class="absolute top-0 end-0 -me-18 mt-18 hidden lg:block">
          <img
            src="assets/images/elements/grad-shape/blur-decoration.svg"
            class="blur-[144px] opacity-20"
            alt="Grad shape"
          />
        </div>
        <img src="assets/images/about/15.jpg" class="rounded-2xl z-20 relative" alt="about image" />
      </div>

      <div class="col-span-7 lg:w-150 ms-auto">
        <h2 class="mb-4 md:mb-7.5 lg:text-4.5xl md:text-4xl text-3xl">
          Comprehensive financial solutions for you
        </h2>

        <div class="grid md:grid-cols-2">
          @for (col of serviceLinksData; track $index) {
            <div class="flex flex-col gap-2.5">
              @for (item of col.items; track item.label) {
                <a [routerLink]="item.link" class="group flex items-center py-1 pe-4">
                  <span
                    class="text-2.2xl text-default-400 font-medium group-hover:text-default-900 transition-all duration-300 animate-underline"
                  >
                    {{ item.label }}
                  </span>

                  <span class="ms-2">
                    <lucide-icon
                      name="arrow-right"
                      class="size-5.5 opacity-0 group-hover:opacity-100 transition-all duration-300"
                    ></lucide-icon>
                  </span>
                </a>
              }
            </div>
          }
        </div>

        <p
          class="inline-block text-default-700 mt-4 lg:mt-7.5 mb-0 rounded-lg bg-secondary/25 border border-primary/10 px-7.5 py-4"
        >
          🤝 Looking for business opportunity?
          <a routerLink="/contact-us/v1" class="font-semibold hover-underline text-primary">
            Send message
          </a>
        </p>
      </div>
    </div>
  </div>
</section>
